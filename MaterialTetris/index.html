<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>材质方块 · Material Tetris</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <main class="app">
    <section class="panel game-panel">
      <header class="panel-header">
        <h1>材质方块</h1>
        <p>Material Tetris</p>
      </header>
      <div id="board" class="board" aria-label="游戏区域"></div>
      <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
    </section>

    <aside class="panel side-panel">
      <div class="stats">
        <div class="stat-card"><span>分数</span><b id="score">0</b></div>
        <div class="stat-card"><span>等级</span><b id="level">1</b></div>
        <div class="stat-card"><span>行数</span><b id="lines">0</b></div>
      </div>

      <div class="next-wrap">
        <div class="label">下一个方块</div>
        <div id="nextBoard" class="next-board"></div>
      </div>

      <div class="theme-tip">
        <div class="label">当前材质主题</div>
        <div id="themeName" class="theme-name">-</div>
        <div id="themeHint" class="theme-hint">-</div>
      </div>

      <div class="controls">
        <button id="startBtn" class="btn btn-primary">开始</button>
        <button id="pauseBtn" class="btn">暂停</button>
        <button id="restartBtn" class="btn btn-danger">重新开始</button>
      </div>

      <div class="keymap">
        <h3>键位</h3>
        <p>← / → 左右移动</p>
        <p>↑ 旋转 ↓ 加速下落</p>
        <p>Space 直落 P 暂停</p>
      </div>
    </aside>
  </main>

  <nav class="touch-controls" aria-label="触屏控制">
    <button data-action="left">◀</button>
    <button data-action="rotate">⟳</button>
    <button data-action="right">▶</button>
    <button data-action="down">▼</button>
    <button data-action="drop">⤓</button>
    <button data-action="pause">Ⅱ</button>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="./script.js"></script>
</body>
</html>
