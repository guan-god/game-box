<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a2a2e 0%, #2d2d4e 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
        }

        #game-canvas {
            display: block;
            background: linear-gradient(180deg, #0f0f23 0%, #1a1a2e 50%, #0a0a1a 100%);
            border-radius: 15px;
            box-shadow: 
                0 0 60px rgba(0, 200, 255, 0.3),
                inset 0 0 150px rgba(0, 0, 0, 0.5);
        }

        .side-panel {
            position: absolute;
            top: 0;
            right: -220px;
            width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-box {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-title {
            color: #b388ff;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .panel-value {
            color: #fff;
            font-size: 28px;
            text-align: center;
            font-weight: bold;
        }

        .lives-container {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .life-ball {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .life-ball.lost {
            background: rgba(100, 100, 100, 0.3);
            box-shadow: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00c9ff, #92fe9d);
            color: #0a0a0a;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 201, 255, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .instructions {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            line-height: 1.8;
        }

        .instructions h3 {
            color: #b388ff;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 5px;
            font-family: monospace;
            margin: 0 3px;
            color: #b388ff;
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 15px;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
        }

        .overlay-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 30px currentColor;
        }

        .overlay-title.start {
            background: linear-gradient(135deg, #00f5ff, #92fe9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-title.gameover {
            color: #ff6b6b;
        }

        .overlay-subtitle {
            color: #8892b0;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .score-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        .score-popup.show {
            animation: scorePopup 0.8s forwards;
        }

        @keyframes scorePopup {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1) translateY(-30px); }
        }

        .warning-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b6b;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
            opacity: 0;
            z-index: 10;
        }

        .warning-text.show {
            animation: warningPulse 0.5s ease-in-out;
        }

        @keyframes warningPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="game-canvas" width="600" height="700"></canvas>
        
        <div class="side-panel">
            <div class="panel-box">
                <div class="panel-title">分数</div>
                <div class="panel-value" id="score">0</div>
            </div>
            
            <div class="panel-box">
                <div class="panel-title">最高分</div>
                <div class="panel-value" id="high-score">0</div>
            </div>
            
            <div class="panel-box">
                <div class="panel-title">存活时间</div>
                <div class="panel-value" id="time">0s</div>
            </div>
            
            <div class="panel-box">
                <div class="panel-title">球数</div>
                <div class="panel-value" id="ball-count">1</div>
            </div>
            
            <div class="panel-box">
                <div class="panel-title">生命</div>
                <div class="lives-container" id="lives"></div>
            </div>
            
            <div class="controls">
                <button class="btn btn-primary" id="start-btn">开始游戏</button>
                <button class="btn btn-secondary" id="pause-btn">暂停</button>
            </div>
            
            <div class="panel-box instructions">
                <h3>操作说明</h3>
                <p><span class="key">←</span><span class="key">→</span> 移动</p>
                <p><span class="key">↑</span><span class="key">↓</span> 上下移动</p>
                <p><span class="key">空格</span> 暂停</p>
            </div>
        </div>
        
        <div class="score-popup" id="score-popup"></div>
        <div class="warning-text" id="warning-text">新球出现!</div>
        
        <div class="game-overlay" id="start-overlay">
            <div class="overlay-content">
                <div class="overlay-title start">躲避球</div>
                <div class="overlay-subtitle">控制小球躲避敌人，存活越久分数越高！</div>
                <button class="btn btn-primary" id="game-start-btn">开始游戏</button>
            </div>
        </div>
        
        <div class="game-overlay" id="gameover-overlay" style="display: none;">
            <div class="overlay-content">
                <div class="overlay-title gameover">游戏结束</div>
                <div class="overlay-subtitle">存活时间: <span id="final-time">0</span>秒</div>
                <div class="overlay-subtitle">最终得分: <span id="final-score">0</span></div>
                <button class="btn btn-primary" id="restart-btn">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;

        let gameState = 'start';
        let score = 0;
        let highScore = parseInt(localStorage.getItem('dodgeHighScore')) || 0;
        let survivalTime = 0;
        let lives = 3;
        let player = null;
        let balls = [];
        let particles = [];
        let keys = {};
        let lastTime = 0;
        let ballSpawnTimer = 0;
        let difficultyTimer = 0;

        const PLAYER_SIZE = 18;
        const INITIAL_BALL_SPEED = 3;
        const BALL_SPEED_INCREMENT = 0.2;
        const BALL_SPAWN_INTERVAL = 8000;

        const COLORS = {
            player: '#00f5ff',
            playerGlow: 'rgba(0, 245, 255, 0.5)',
            ball: ['#ff6b6b', '#ff8e53', '#ffd700', '#69f0ae', '#e040fb', '#7c4dff']
        };

        class Player {
            constructor() {
                this.x = WIDTH / 2;
                this.y = HEIGHT / 2;
                this.size = PLAYER_SIZE;
                this.speed = 5;
                this.invincible = false;
                this.invincibleTimer = 0;
                this.trail = [];
            }

            update() {
                let moveX = 0;
                let moveY = 0;

                if (keys['ArrowLeft'] || keys['KeyA']) moveX -= 1;
                if (keys['ArrowRight'] || keys['KeyD']) moveX += 1;
                if (keys['ArrowUp'] || keys['KeyW']) moveY -= 1;
                if (keys['ArrowDown'] || keys['KeyS']) moveY += 1;

                if (moveX !== 0 && moveY !== 0) {
                    moveX *= 0.707;
                    moveY *= 0.707;
                }

                this.x += moveX * this.speed;
                this.y += moveY * this.speed;

                this.x = Math.max(this.size, Math.min(WIDTH - this.size, this.x));
                this.y = Math.max(this.size, Math.min(HEIGHT - this.size, this.y));

                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 15) {
                    this.trail.shift();
                }

                if (this.invincible) {
                    this.invincibleTimer--;
                    if (this.invincibleTimer <= 0) {
                        this.invincible = false;
                    }
                }
            }

            draw() {
                ctx.save();

                this.trail.forEach((pos, i) => {
                    const alpha = i / this.trail.length * 0.3;
                    ctx.fillStyle = `rgba(0, 245, 255, ${alpha})`;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fill();
                });

                if (this.invincible && Math.floor(Date.now() / 100) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                ctx.shadowBlur = 20;
                ctx.shadowColor = COLORS.playerGlow;

                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.5, '#00f5ff');
                gradient.addColorStop(1, '#0099cc');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 3, 4, 0, Math.PI * 2);
                ctx.arc(this.x + 5, this.y - 3, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.x - 5, this.y - 3, 2, 0, Math.PI * 2);
                ctx.arc(this.x + 5, this.y - 3, 2, 0, Math.PI * 2);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y + 5, 6, 0, Math.PI);
                ctx.strokeStyle = '#006699';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.restore();
            }

            hit() {
                if (this.invincible) return false;
                this.invincible = true;
                this.invincibleTimer = 90;
                createParticles(this.x, this.y, COLORS.player, 20);
                return true;
            }
        }

        class Ball {
            constructor(speedMultiplier) {
                this.radius = 12 + Math.random() * 8;
                this.speed = INITIAL_BALL_SPEED + speedMultiplier;
                this.color = COLORS.ball[Math.floor(Math.random() * COLORS.ball.length)];
                
                const side = Math.floor(Math.random() * 4);
                switch (side) {
                    case 0:
                        this.x = Math.random() * WIDTH;
                        this.y = -this.radius;
                        this.vx = (Math.random() - 0.5) * this.speed * 2;
                        this.vy = this.speed;
                        break;
                    case 1:
                        this.x = WIDTH + this.radius;
                        this.y = Math.random() * HEIGHT;
                        this.vx = -this.speed;
                        this.vy = (Math.random() - 0.5) * this.speed * 2;
                        break;
                    case 2:
                        this.x = Math.random() * WIDTH;
                        this.y = HEIGHT + this.radius;
                        this.vx = (Math.random() - 0.5) * this.speed * 2;
                        this.vy = -this.speed;
                        break;
                    case 3:
                        this.x = -this.radius;
                        this.y = Math.random() * HEIGHT;
                        this.vx = this.speed;
                        this.vy = (Math.random() - 0.5) * this.speed * 2;
                        break;
                }
                
                this.trail = [];
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 10) {
                    this.trail.shift();
                }

                this.x += this.vx;
                this.y += this.vy;

                if (this.x - this.radius <= 0) {
                    this.x = this.radius;
                    this.vx = Math.abs(this.vx);
                    createParticles(this.x, this.y, this.color, 5);
                }
                if (this.x + this.radius >= WIDTH) {
                    this.x = WIDTH - this.radius;
                    this.vx = -Math.abs(this.vx);
                    createParticles(this.x, this.y, this.color, 5);
                }
                if (this.y - this.radius <= 0) {
                    this.y = this.radius;
                    this.vy = Math.abs(this.vy);
                    createParticles(this.x, this.y, this.color, 5);
                }
                if (this.y + this.radius >= HEIGHT) {
                    this.y = HEIGHT - this.radius;
                    this.vy = -Math.abs(this.vy);
                    createParticles(this.x, this.y, this.color, 5);
                }
            }

            draw() {
                ctx.save();

                this.trail.forEach((pos, i) => {
                    const alpha = i / this.trail.length * 0.3;
                    ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, this.radius * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;

                const gradient = ctx.createRadialGradient(
                    this.x - 3, this.y - 3, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, this.darkenColor(this.color, 0.3));

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            darkenColor(color, factor) {
                const hex = color.replace('#', '');
                const r = Math.floor(parseInt(hex.substr(0, 2), 16) * (1 - factor));
                const g = Math.floor(parseInt(hex.substr(2, 2), 16) * (1 - factor));
                const b = Math.floor(parseInt(hex.substr(4, 2), 16) * (1 - factor));
                return `rgb(${r}, ${g}, ${b})`;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.life = 1;
                this.size = 3 + Math.random() * 5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.03;
                this.size *= 0.97;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function checkCollisions() {
            if (!player) return;

            for (const ball of balls) {
                const dx = player.x - ball.x;
                const dy = player.y - ball.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < player.size + ball.radius) {
                    if (!player.invincible) {
                        lives--;
                        player.invincible = true;
                        player.invincibleTimer = 90;
                        createParticles(player.x, player.y, COLORS.player, 20);
                        updateUI();
                        
                        if (lives <= 0) {
                            gameOver();
                            return;
                        }
                    }
                }
            }
        }

        function spawnBall() {
            const speedMultiplier = BALL_SPEED_INCREMENT * Math.floor(survivalTime / 10);
            balls.push(new Ball(speedMultiplier));
            
            const warning = document.getElementById('warning-text');
            warning.textContent = `球数: ${balls.length}`;
            warning.classList.remove('show');
            void warning.offsetWidth;
            warning.classList.add('show');
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = survivalTime + 's';
            document.getElementById('ball-count').textContent = balls.length;
            document.getElementById('high-score').textContent = highScore;
            
            const livesContainer = document.getElementById('lives');
            if (livesContainer) {
                livesContainer.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    const life = document.createElement('div');
                    life.className = 'life-ball' + (i >= lives ? ' lost' : '');
                    livesContainer.appendChild(life);
                }
            }
        }

        function gameOver() {
            gameState = 'gameover';
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('dodgeHighScore', highScore);
            }
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('final-time').textContent = survivalTime;
            document.getElementById('gameover-overlay').style.display = 'flex';
        }

        function startGame() {
            gameState = 'playing';
            score = 0;
            survivalTime = 0;
            lives = 3;
            balls = [];
            particles = [];
            ballSpawnTimer = 0;
            difficultyTimer = 0;

            player = new Player();
            spawnBall();

            updateUI();
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('gameover-overlay').style.display = 'none';
            document.getElementById('pause-btn').textContent = '暂停';
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            gradient.addColorStop(0, '#0f0f23');
            gradient.addColorStop(0.5, '#1a1a2e');
            gradient.addColorStop(1, '#0a0a1a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i < WIDTH; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, HEIGHT);
                ctx.stroke();
            }
            for (let i = 0; i < HEIGHT; i += 30) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(WIDTH, i);
                ctx.stroke();
            }

            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = `rgba(255, 255, 255, ${0.02 + Math.random() * 0.03})`;
                ctx.beginPath();
                ctx.arc(
                    (i * 47 + Date.now() * 0.01) % WIDTH,
                    (i * 73 + Date.now() * 0.005) % HEIGHT,
                    1 + Math.random() * 2,
                    0, Math.PI * 2
                );
                ctx.fill();
            }
        }

        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            drawBackground();

            if (gameState === 'playing') {
                player.update();

                balls.forEach(ball => ball.update());

                checkCollisions();

                particles = particles.filter(p => {
                    p.update();
                    return p.life > 0;
                });

                ballSpawnTimer += deltaTime;
                if (ballSpawnTimer >= BALL_SPAWN_INTERVAL) {
                    ballSpawnTimer = 0;
                    spawnBall();
                }

                difficultyTimer += deltaTime;
                if (difficultyTimer >= 1000) {
                    difficultyTimer = 0;
                    survivalTime++;
                    score += 10;
                    updateUI();
                }
            }

            particles.forEach(p => p.draw());
            balls.forEach(ball => ball.draw());
            if (player) player.draw();

            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', e => {
            keys[e.code] = true;

            if (e.code === 'Space') {
                e.preventDefault();
                if (gameState === 'playing') {
                    gameState = 'paused';
                    document.getElementById('pause-btn').textContent = '继续';
                } else if (gameState === 'paused') {
                    gameState = 'playing';
                    document.getElementById('pause-btn').textContent = '暂停';
                }
            }

            if (e.code === 'KeyR' && gameState !== 'start') {
                startGame();
            }
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('game-start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        document.getElementById('pause-btn').addEventListener('click', () => {
            if (gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pause-btn').textContent = '继续';
            } else if (gameState === 'paused') {
                gameState = 'playing';
                document.getElementById('pause-btn').textContent = '暂停';
            }
        });

        document.getElementById('high-score').textContent = highScore;

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
