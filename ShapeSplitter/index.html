<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一刀两断</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>一刀两断</h1>
      <div class="pill">最佳分：<b id="bestScore">0</b></div>
      <div class="pill">形状评级：<b id="shapeRank">-</b></div>
      <div class="pill">难度系数：<b id="multiplier">-</b></div>
    </header>

    <section class="board-wrap">
      <canvas id="gameCanvas" width="960" height="600"></canvas>
      <div id="toast" class="toast"></div>
    </section>

    <section class="panel">
      <div class="hint">按下并拖动鼠标完成一刀切</div>
      <div class="result-grid">
        <div>左侧面积：<b id="leftPct">-</b></div>
        <div>右侧面积：<b id="rightPct">-</b></div>
        <div>面积分：<b id="areaScore">-</b></div>
        <div>最终分：<b id="finalScore">-</b></div>
      </div>
      <button id="nextBtn">再来一局</button>
    </section>
  </main>

  <script src="./bundle.js"></script>
</body>
</html>
