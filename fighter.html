<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格斗之王</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1b1b 50%, #1a0a0a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
        }

        #game-canvas {
            display: block;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a0a 50%, #0f0505 100%);
            border-radius: 15px;
            box-shadow: 
                0 0 80px rgba(255, 50, 50, 0.3),
                inset 0 0 150px rgba(0, 0, 0, 0.5);
        }

        .battle-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .fighter-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .fighter-info.player2 {
            align-items: flex-end;
        }

        .fighter-name {
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
            letter-spacing: 2px;
        }

        .fighter-name.player1 { color: #00f5ff; }
        .fighter-name.player2 { color: #ff6b6b; }

        .health-container {
            width: 300px;
            height: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .health-bar {
            height: 100%;
            transition: width 0.3s ease;
            position: relative;
        }

        .health-bar.player1 {
            background: linear-gradient(90deg, #00c9ff, #92fe9d);
            box-shadow: 0 0 20px rgba(0, 201, 255, 0.5);
        }

        .health-bar.player2 {
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }

        .health-bar.critical {
            animation: criticalPulse 0.5s infinite;
        }

        @keyframes criticalPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .health-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
        }

        .energy-bar {
            width: 200px;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            overflow: hidden;
        }

        .energy-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            transition: width 0.2s;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .super-bar {
            width: 150px;
            height: 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 3px;
        }

        .super-fill {
            height: 100%;
            background: linear-gradient(90deg, #e040fb, #7c4dff);
            transition: width 0.2s;
            box-shadow: 0 0 10px rgba(224, 64, 251, 0.5);
        }

        .round-info {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .round-text {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            letter-spacing: 5px;
        }

        .round-wins {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 5px;
        }

        .win-star {
            width: 20px;
            height: 20px;
            background: rgba(255, 215, 0, 0.3);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            transition: all 0.3s;
        }

        .win-star.active {
            background: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
        }

        .timer {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        .timer.critical {
            color: #ff6b6b;
            animation: criticalPulse 0.5s infinite;
        }

        .hit-display {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px currentColor;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }

        .hit-display.show {
            animation: hitText 0.5s forwards;
        }

        @keyframes hitText {
            0% { opacity: 1; transform: translateX(-50%) scale(0.5); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-30px) scale(1); }
        }

        .game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 15px;
        }

        .overlay-content {
            text-align: center;
            padding: 40px;
        }

        .overlay-title {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 30px currentColor;
        }

        .overlay-title.start {
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-title.player1-win {
            color: #00f5ff;
        }

        .overlay-title.player2-win {
            color: #ff6b6b;
        }

        .overlay-subtitle {
            color: #8892b0;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 15px 50px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            color: #0a0a0a;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.4);
        }

        .character-select {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .character-card {
            width: 120px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }

        .character-card:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .character-card.selected {
            border-color: #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .character-avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 10px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
        }

        .character-name {
            color: #fff;
            font-size: 14px;
            text-align: center;
            font-weight: 600;
        }

        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            z-index: 10;
        }

        .controls-hint span {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 3px;
            font-family: monospace;
        }

        .combo-display {
            position: absolute;
            top: 200px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            opacity: 0;
            z-index: 15;
        }

        .combo-display.show {
            animation: comboShow 0.8s forwards;
        }

        @keyframes comboShow {
            0% { opacity: 1; transform: translateX(-50%) scale(0.5); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.3); }
            100% { opacity: 0; transform: translateX(-50%) scale(1); }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <canvas id="game-canvas" width="900" height="600"></canvas>
        
        <div class="battle-ui">
            <div class="fighter-info player1">
                <div class="fighter-name player1" id="p1-name">玩家 1</div>
                <div class="health-container">
                    <div class="health-bar player1" id="p1-health" style="width: 100%"></div>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill" id="p1-energy" style="width: 0%"></div>
                </div>
                <div class="super-bar">
                    <div class="super-fill" id="p1-super" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="fighter-info player2">
                <div class="fighter-name player2" id="p2-name">CPU</div>
                <div class="health-container">
                    <div class="health-bar player2" id="p2-health" style="width: 100%"></div>
                </div>
                <div class="energy-bar">
                    <div class="energy-fill" id="p2-energy" style="width: 0%"></div>
                </div>
                <div class="super-bar">
                    <div class="super-fill" id="p2-super" style="width: 0%"></div>
                </div>
            </div>
        </div>
        
        <div class="round-info">
            <div class="round-text" id="round-text">ROUND 1</div>
            <div class="round-wins" id="round-wins">
                <div class="win-star" id="p1-win-0"></div>
                <div class="win-star" id="p1-win-1"></div>
                <div class="win-star" id="p2-win-0"></div>
                <div class="win-star" id="p2-win-1"></div>
            </div>
        </div>
        
        <div class="timer" id="timer">99</div>
        
        <div class="hit-display" id="hit-display"></div>
        <div class="combo-display" id="combo-display"></div>
        
        <div class="controls-hint">
            <span>←</span><span>→</span> 移动 | 
            <span>↑</span> 跳跃 | 
            <span>Z</span> 轻拳 | 
            <span>X</span> 重拳 | 
            <span>C</span> 轻腿 | 
            <span>V</span> 重腿 | 
            <span>A</span> 防御 | 
            <span>S</span> 必杀技
        </div>
        
        <div class="game-overlay" id="start-overlay">
            <div class="overlay-content">
                <div class="overlay-title start">格斗之王</div>
                <div class="overlay-subtitle">选择你的角色，击败对手！</div>
                
                <div class="character-select" id="character-select">
                    <div class="character-card selected" data-char="0">
                        <div class="character-avatar" style="background: linear-gradient(135deg, #00c9ff, #0099cc);">🥷</div>
                        <div class="character-name">烈焰忍者</div>
                    </div>
                    <div class="character-card" data-char="1">
                        <div class="character-avatar" style="background: linear-gradient(135deg, #ff6b6b, #cc4444);">🦸</div>
                        <div class="character-name">钢铁战士</div>
                    </div>
                    <div class="character-card" data-char="2">
                        <div class="character-avatar" style="background: linear-gradient(135deg, #ffd700, #cc9900);">🧙</div>
                        <div class="character-name">元素法师</div>
                    </div>
                </div>
                
                <button class="btn btn-primary" id="start-btn">开始战斗</button>
            </div>
        </div>
        
        <div class="game-overlay" id="gameover-overlay" style="display: none;">
            <div class="overlay-content">
                <div class="overlay-title" id="winner-text">玩家 1 胜利!</div>
                <div class="overlay-subtitle" id="winner-subtitle">精彩的比赛!</div>
                <button class="btn btn-primary" id="restart-btn">再来一局</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const WIDTH = canvas.width;
        const HEIGHT = canvas.height;
        const GROUND = HEIGHT - 80;

        const CHARACTERS = [
            { name: '烈焰忍者', color: '#00c9ff', avatar: '🥷', 
              speed: 5, power: 1.0, defense: 1.0,
              lightPunch: 8, heavyPunch: 15, lightKick: 10, heavyKick: 18,
              special: 25 },
            { name: '钢铁战士', color: '#ff6b6b', avatar: '🦸',
              speed: 4, power: 1.2, defense: 1.3,
              lightPunch: 10, heavyPunch: 18, lightKick: 12, heavyKick: 22,
              special: 30 },
            { name: '元素法师', color: '#ffd700', avatar: '🧙',
              speed: 6, power: 0.9, defense: 0.8,
              lightPunch: 7, heavyPunch: 12, lightKick: 9, heavyKick: 15,
              special: 35 }
        ];

        const STATES = {
            IDLE: 'idle',
            WALK: 'walk',
            JUMP: 'jump',
            CROUCH: 'crouch',
            LIGHT_PUNCH: 'lightPunch',
            HEAVY_PUNCH: 'heavyPunch',
            LIGHT_KICK: 'lightKick',
            HEAVY_KICK: 'heavyKick',
            BLOCK: 'block',
            HIT: 'hit',
            SPECIAL: 'special',
            WIN: 'win',
            LOSE: 'lose'
        };

        let gameState = 'start';
        let round = 1;
        let timer = 99;
        let timerInterval = null;
        let p1Wins = 0;
        let p2Wins = 0;
        let selectedChar = 0;

        let player1 = null;
        let player2 = null;

        let keys = {};

        class Fighter {
            constructor(isPlayer, charIndex, startX) {
                this.isPlayer = isPlayer;
                this.char = CHARACTERS[charIndex];
                this.x = startX;
                this.y = GROUND;
                this.vx = 0;
                this.vy = 0;
                this.width = 60;
                this.height = 120;
                this.facing = isPlayer ? 1 : -1;
                
                this.health = 100;
                this.maxHealth = 100;
                this.energy = 0;
                this.super = 0;
                
                this.state = STATES.IDLE;
                this.stateTimer = 0;
                this.animFrame = 0;
                this.animSpeed = 0;
                
                this.isGrounded = true;
                this.isBlocking = false;
                this.isAI = !isPlayer;
                
                this.combo = 0;
                this.comboTimer = 0;
                this.hitStun = 0;
            }

            update(opponent) {
                if (this.hitStun > 0) {
                    this.hitStun--;
                    if (this.hitStun === 0) {
                        this.state = STATES.IDLE;
                    }
                }

                if (this.stateTimer > 0) {
                    this.stateTimer--;
                    if (this.stateTimer === 0 && this.state !== STATES.WIN && this.state !== STATES.LOSE) {
                        this.state = STATES.IDLE;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                if (!this.isGrounded) {
                    this.vy += 0.8;
                }

                if (this.y >= GROUND) {
                    this.y = GROUND;
                    this.vy = 0;
                    this.isGrounded = true;
                }

                this.x = Math.max(30, Math.min(WIDTH - 30, this.x));

                if (opponent) {
                    this.facing = opponent.x > this.x ? 1 : -1;
                }

                this.animSpeed = Math.max(0.1, this.animSpeed - 0.02);
                this.animFrame += this.animSpeed;

                if (this.energy < 100) this.energy += 0.1;
                if (this.comboTimer > 0) {
                    this.comboTimer--;
                    if (this.comboTimer === 0) this.combo = 0;
                }
            }

            moveLeft() {
                if (this.canMove()) {
                    this.vx = -this.char.speed;
                    this.state = STATES.WALK;
                }
            }

            moveRight() {
                if (this.canMove()) {
                    this.vx = this.char.speed;
                    this.state = STATES.WALK;
                }
            }

            stopMove() {
                this.vx *= 0.7;
                if (Math.abs(this.vx) < 0.5) {
                    this.vx = 0;
                    if (this.state === STATES.WALK && this.hitStun === 0) {
                        this.state = STATES.IDLE;
                    }
                }
            }

            jump() {
                if (this.isGrounded && this.canMove()) {
                    this.vy = -18;
                    this.isGrounded = false;
                }
            }

            lightPunch() {
                if (this.canAttack()) {
                    this.state = STATES.LIGHT_PUNCH;
                    this.stateTimer = 15;
                    this.animSpeed = 1;
                    return this.attack(this.char.lightPunch, 20, '轻拳', 30);
                }
                return null;
            }

            heavyPunch() {
                if (this.canAttack()) {
                    this.state = STATES.HEAVY_PUNCH;
                    this.stateTimer = 25;
                    this.animSpeed = 1;
                    return this.attack(this.char.heavyPunch, 40, '重拳', 45);
                }
                return null;
            }

            lightKick() {
                if (this.canAttack()) {
                    this.state = STATES.LIGHT_KICK;
                    this.stateTimer = 18;
                    this.animSpeed = 1;
                    return this.attack(this.char.lightKick, 25, '轻腿', 35);
                }
                return null;
            }

            heavyKick() {
                if (this.canAttack()) {
                    this.state = STATES.HEAVY_KICK;
                    this.stateTimer = 30;
                    this.animSpeed = 1;
                    return this.attack(this.char.heavyKick, 50, '重腿', 55);
                }
                return null;
            }

            special() {
                if (this.super >= 100 && this.canAttack()) {
                    this.super = 0;
                    this.state = STATES.SPECIAL;
                    this.stateTimer = 45;
                    this.animSpeed = 1.5;
                    return this.attack(this.char.special, 80, '必杀技!', 80);
                }
                return null;
            }

            attack(baseDamage, stun, hitText, energyGain) {
                return {
                    damage: baseDamage * this.char.power,
                    stun: stun,
                    hitText: hitText,
                    energyGain: energyGain,
                    x: this.x + 40 * this.facing,
                    y: this.y - 40
                };
            }

            canMove() {
                return this.hitStun === 0 && this.state !== STATES.SPECIAL;
            }

            canAttack() {
                return this.hitStun === 0 && this.state !== STATES.SPECIAL && this.state !== STATES.WIN && this.state !== STATES.LOSE;
            }

            takeDamage(damage, attacker) {
                let actualDamage = damage;
                if (this.isBlocking && this.facing !== (attacker.x > this.x ? 1 : -1)) {
                    actualDamage *= 0.2;
                    showHitText(this.x, this.y - 60, '招架!', '#ffd700');
                } else if (this.isBlocking) {
                    actualDamage *= 0.5;
                    showHitText(this.x, this.y - 60, '防御', '#888');
                }

                this.health -= actualDamage;
                this.energy = Math.min(100, this.energy + 15);
                
                if (actualDamage >= 20) {
                    this.super = Math.min(100, this.super + actualDamage);
                }

                if (attacker) {
                    attacker.combo++;
                    attacker.comboTimer = 60;
                    if (attacker.combo >= 3) {
                        showCombo(attacker.x, attacker.y - 80, attacker.combo);
                    }
                }

                if (this.health <= 0) {
                    this.health = 0;
                    this.state = STATES.LOSE;
                    return true;
                } else {
                    this.hitStun = Math.max(10, Math.floor(damage / 2));
                    this.state = STATES.HIT;
                }
                return false;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.facing, 1);

                ctx.shadowBlur = 20;
                ctx.shadowColor = this.char.color;

                const gradient = ctx.createLinearGradient(-30, -120, 30, 0);
                gradient.addColorStop(0, this.char.color);
                gradient.addColorStop(1, this.darkenColor(this.char.color, 0.5));

                if (this.state === STATES.IDLE || this.state === STATES.WALK) {
                    this.drawIdle(gradient);
                } else if (this.state === STATES.JUMP) {
                    this.drawJump(gradient);
                } else if (this.state.includes('PUNCH')) {
                    this.drawPunch(gradient);
                } else if (this.state.includes('KICK')) {
                    this.drawKick(gradient);
                } else if (this.state === STATES.BLOCK) {
                    this.drawBlock(gradient);
                } else if (this.state === STATES.HIT) {
                    this.drawHit(gradient);
                } else if (this.state === STATES.SPECIAL) {
                    this.drawSpecial(gradient);
                } else if (this.state === STATES.WIN) {
                    this.drawWin(gradient);
                } else if (this.state === STATES.LOSE) {
                    this.drawLose(gradient);
                }

                ctx.restore();
            }

            drawIdle(gradient) {
                const bob = Math.sin(this.animFrame * 0.2) * 3;
                
                ctx.fillStyle = gradient;
                ctx.fillRect(-20, -100 + bob, 40, 60);
                
                ctx.beginPath();
                ctx.arc(0, -110 + bob, 18, 0, Math.PI * 2);
                ctx.fill();

                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -108 + bob);

                ctx.fillRect(-25, -40 + bob, 15, 40);
                ctx.fillRect(10, -40 + bob, 15, 40);
                ctx.fillRect(-15, 0, 12, 30);
                ctx.fillRect(3, 0, 12, 30);
            }

            drawJump(gradient) {
                ctx.fillStyle = gradient;
                ctx.fillRect(-15, -80, 30, 50);
                ctx.beginPath();
                ctx.arc(0, -90, 15, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -88);
                ctx.fillRect(-20, -30, 12, 25);
                ctx.fillRect(8, -30, 12, 25);
                ctx.fillRect(-12, -5, 10, 20);
                ctx.fillRect(2, -5, 10, 20);
            }

            drawPunch(gradient) {
                const progress = 1 - this.stateTimer / 25;
                const extend = Math.sin(progress * Math.PI) * 30;
                
                ctx.fillStyle = gradient;
                ctx.fillRect(-15, -100, 30, 50);
                ctx.beginPath();
                ctx.arc(0, -110, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '22px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -108);

                ctx.fillRect(-25, -40, 12, 30);
                ctx.fillRect(13, -40, 35 + extend, 12);
                
                ctx.fillRect(-15, -10, 10, 25);
                ctx.fillRect(5, -10, 10, 25);
            }

            drawKick(gradient) {
                const progress = 1 - this.stateTimer / 30;
                const extend = Math.sin(progress * Math.PI) * 40;
                
                ctx.fillStyle = gradient;
                ctx.fillRect(-15, -100, 30, 50);
                ctx.beginPath();
                ctx.arc(0, -110, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '22px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -108);

                ctx.fillRect(-25, -40, 10, 25);
                ctx.fillRect(-5, -40, 10, 25);
                ctx.fillRect(5, 0, 35 + extend, 14);
            }

            drawBlock(gradient) {
                ctx.fillStyle = gradient;
                ctx.fillRect(-20, -100, 40, 60);
                ctx.beginPath();
                ctx.arc(0, -110, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '22px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -108);

                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(10, -70);
                ctx.lineTo(30, -50);
                ctx.lineTo(10, -30);
                ctx.stroke();

                ctx.fillRect(-20, -40, 12, 35);
                ctx.fillRect(8, -40, 12, 35);
                ctx.fillRect(-12, -5, 10, 25);
                ctx.fillRect(2, -5, 10, 25);
            }

            drawHit(gradient) {
                const shake = Math.random() * 6 - 3;
                ctx.translate(shake, 0);
                
                ctx.fillStyle = '#ff4444';
                ctx.fillRect(-20, -100, 40, 60);
                ctx.beginPath();
                ctx.arc(0, -110, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '22px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -108);
                
                ctx.fillStyle = '#ff6666';
                ctx.fillRect(-25, -40, 12, 30);
                ctx.fillRect(13, -40, 12, 30);
                ctx.fillRect(-15, -10, 10, 25);
                ctx.fillRect(5, -10, 10, 25);
            }

            drawSpecial(gradient) {
                const pulse = Math.sin(this.animFrame * 0.5) * 10;
                
                ctx.shadowBlur = 40;
                ctx.shadowColor = this.char.color;
                
                const particleCount = 5;
                for (let i = 0; i < particleCount; i++) {
                    const angle = (i / particleCount) * Math.PI * 2 + this.animFrame * 0.2;
                    const px = Math.cos(angle) * (40 + pulse);
                    const py = -60 + Math.sin(angle) * 20;
                    
                    ctx.fillStyle = this.char.color;
                    ctx.globalAlpha = 0.5;
                    ctx.beginPath();
                    ctx.arc(px, py, 8, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                ctx.fillStyle = gradient;
                ctx.fillRect(-20, -100, 40, 60);
                ctx.beginPath();
                ctx.arc(0, -110, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '26px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -108);

                ctx.fillRect(-25, -40, 12, 30);
                ctx.fillRect(13, -40, 12, 30);
                ctx.fillRect(-15, -10, 10, 25);
                ctx.fillRect(5, -10, 10, 25);
            }

            drawWin(gradient) {
                const jump = Math.abs(Math.sin(this.animFrame * 0.3)) * 20;
                
                ctx.fillStyle = gradient;
                ctx.fillRect(-20, -100 - jump, 40, 60);
                ctx.beginPath();
                ctx.arc(0, -110 - jump, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '26px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -108 - jump);

                ctx.fillStyle = '#ffd700';
                ctx.font = 'bold 16px Arial';
                ctx.fillText('胜!', 25, -120 - jump);

                ctx.fillRect(-25, -40 - jump, 12, 30);
                ctx.fillRect(13, -40 - jump, 12, 30);
                ctx.fillRect(-15, -10 - jump, 10, 25);
                ctx.fillRect(5, -10 - jump, 10, 25);
            }

            drawLose(gradient) {
                ctx.translate(0, 30);
                ctx.rotate(Math.PI / 2);
                
                ctx.fillStyle = '#666';
                ctx.fillRect(-20, -100, 40, 60);
                ctx.beginPath();
                ctx.arc(0, -110, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = '22px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.char.avatar, 0, -108);
            }

            darkenColor(color, factor) {
                const r = parseInt(color.slice(1, 3), 16);
                const g = parseInt(color.slice(3, 5), 16);
                const b = parseInt(color.slice(5, 7), 16);
                return `rgb(${Math.floor(r * factor)}, ${Math.floor(g * factor)}, ${Math.floor(b * factor)})`;
            }
        }

        class AI {
            constructor(fighter) {
                this.fighter = fighter;
                this.decisionTimer = 0;
                this.currentAction = null;
            }

            update(player) {
                if (this.fighter.hitStun > 0 || this.fighter.state === STATES.WIN || this.fighter.state === STATES.LOSE) {
                    return;
                }

                this.decisionTimer--;

                if (this.decisionTimer <= 0) {
                    this.makeDecision(player);
                    this.decisionTimer = 20 + Math.random() * 30;
                }

                const distance = Math.abs(this.fighter.x - player.x);
                const diffY = player.y - this.fighter.y;

                if (distance < 80 && Math.random() < 0.3) {
                    const rand = Math.random();
                    if (rand < 0.25) this.fighter.lightPunch();
                    else if (rand < 0.5) this.fighter.heavyPunch();
                    else if (rand < 0.75) this.fighter.lightKick();
                    else this.fighter.heavyKick();
                }

                if (player.state.includes('PUNCH') || player.state.includes('KICK')) {
                    if (distance < 100) {
                        this.fighter.isBlocking = Math.random() < 0.7;
                    }
                } else {
                    this.fighter.isBlocking = false;
                }

                if (this.fighter.super >= 100 && distance < 150 && Math.random() < 0.4) {
                    this.fighter.special();
                }

                if (this.fighter.state === STATES.IDLE || this.fighter.state === STATES.WALK) {
                    if (distance > 200) {
                        this.fighter.moveRight();
                    } else if (distance < 60) {
                        this.fighter.moveLeft();
                    } else {
                        this.fighter.stopMove();
                    }
                }
            }

            makeDecision(player) {
                const healthPercent = player.health / player.maxHealth;
                
                if (healthPercent < 0.3 && this.fighter.health > player.health * 1.5) {
                    if (Math.random() < 0.6) {
                        this.currentAction = 'aggressive';
                    }
                } else if (healthPercent > 0.7) {
                    if (Math.random() < 0.3) {
                        this.currentAction = 'defensive';
                    }
                }
            }
        }

        function showHitText(x, y, text, color) {
            const display = document.getElementById('hit-display');
            display.textContent = text;
            display.style.left = x + 'px';
            display.style.top = y + 'px';
            display.style.color = color;
            display.classList.remove('show');
            void display.offsetWidth;
            display.classList.add('show');
        }

        function showCombo(x, y, count) {
            const display = document.getElementById('combo-display');
            display.textContent = `${count} 连击!`;
            display.style.left = x + 'px';
            display.classList.remove('show');
            void display.offsetWidth;
            display.classList.add('show');
        }

        function updateUI() {
            document.getElementById('p1-health').style.width = player1.health + '%';
            document.getElementById('p1-energy').style.width = player1.energy + '%';
            document.getElementById('p1-super').style.width = player1.super + '%';
            
            document.getElementById('p2-health').style.width = player2.health + '%';
            document.getElementById('p2-energy').style.width = player2.energy + '%';
            document.getElementById('p2-super').style.width = player2.super + '%';

            if (player1.health < 30) {
                document.getElementById('p1-health').classList.add('critical');
            } else {
                document.getElementById('p1-health').classList.remove('critical');
            }

            if (player2.health < 30) {
                document.getElementById('p2-health').classList.add('critical');
            } else {
                document.getElementById('p2-health').classList.remove('critical');
            }

            document.getElementById('timer').textContent = timer;
            if (timer <= 10) {
                document.getElementById('timer').classList.add('critical');
            } else {
                document.getElementById('timer').classList.remove('critical');
            }
        }

        function updateRoundWins() {
            for (let i = 0; i < 2; i++) {
                document.getElementById(`p1-win-${i}`).classList.toggle('active', i < p1Wins);
                document.getElementById(`p2-win-${i}`).classList.toggle('active', i < p2Wins);
            }
        }

        function startRound() {
            gameState = 'playing';
            timer = 99;
            
            player1 = new Fighter(true, selectedChar, 250);
            player2 = new Fighter(false, (selectedChar + 1) % 3, 650);
            player2.ai = new AI(player2);
            
            document.getElementById('p1-name').textContent = player1.char.name;
            document.getElementById('p2-name').textContent = player2.char.name;
            
            document.getElementById('round-text').textContent = `ROUND ${round}`;
            
            updateRoundWins();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState === 'playing') {
                    timer--;
                    if (timer <= 0) {
                        endRound();
                    }
                    updateUI();
                }
            }, 1000);
            
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('gameover-overlay').style.display = 'none';
        }

        function checkHit(attacker, defender) {
            if (attacker.stateTimer > 5 && attacker.stateTimer < 20) {
                const hitX = attacker.x + 50 * attacker.facing;
                const hitY = attacker.y - 40;
                
                const dx = hitX - defender.x;
                const dy = hitY - (defender.y - 40);
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 60) {
                    const attack = attacker.lastAttack;
                    if (attack && !attacker.hasHit) {
                        attacker.hasHit = true;
                        
                        const killed = defender.takeDamage(attack.damage, attacker);
                        showHitText(defender.x, defender.y - 60, attack.hitText, '#ff6b6b');
                        
                        if (killed) {
                            endRound();
                        }
                    }
                }
            }
        }

        function endRound() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            let winner;
            if (player1.health > player2.health) {
                winner = player1;
                player1Wins++;
                player1.state = STATES.WIN;
                player2.state = STATES.LOSE;
            } else if (player2.health > player1.health) {
                winner = player2;
                player2Wins++;
                player2.state = STATES.LOSE;
                player1.state = STATES.WIN;
            } else {
                player1Wins++;
                player2Wins++;
                player1.state = STATES.WIN;
                player2.state = STATES.WIN;
            }

            updateRoundWins();
            gameState = 'roundEnd';

            setTimeout(() => {
                if (p1Wins >= 2 || p2Wins >= 2) {
                    endGame();
                } else {
                    round++;
                    startRound();
                }
            }, 2000);
        }

        function endGame() {
            gameState = 'gameover';
            
            const overlay = document.getElementById('gameover-overlay');
            const title = document.getElementById('winner-text');
            const subtitle = document.getElementById('winner-subtitle');
            
            if (p1Wins > p2Wins) {
                title.textContent = `${player1.char.name} 胜利!`;
                title.className = 'overlay-title player1-win';
                subtitle.textContent = '恭喜你获得了比赛胜利!';
            } else if (p2Wins > p1Wins) {
                title.textContent = 'CPU 胜利!';
                title.className = 'overlay-title player2-win';
                subtitle.textContent = '再接再厉!';
            } else {
                title.textContent = '平局!';
                title.className = 'overlay-title start';
                subtitle.textContent = '势均力敌!';
            }
            
            overlay.style.display = 'flex';
        }

        function resetGame() {
            round = 1;
            p1Wins = 0;
            p2Wins = 0;
            startRound();
        }

        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            gradient.addColorStop(0, '#0a0505');
            gradient.addColorStop(0.5, '#1a0a0a');
            gradient.addColorStop(1, '#0f0505');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            for (let i = 0; i < 50; i++) {
                const x = (i * 73) % WIDTH;
                const y = (i * 47) % (HEIGHT - 150);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.1 + (i % 5) * 0.05})`;
                ctx.beginPath();
                ctx.arc(x, y, 1 + (i % 3), 0, Math.PI * 2);
                ctx.fill();
            }

            const floorGradient = ctx.createLinearGradient(0, GROUND, 0, HEIGHT);
            floorGradient.addColorStop(0, '#2a1a1a');
            floorGradient.addColorStop(1, '#1a0a0a');
            ctx.fillStyle = floorGradient;
            ctx.fillRect(0, GROUND, WIDTH, HEIGHT - GROUND);

            ctx.strokeStyle = '#ff3333';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, GROUND);
            ctx.lineTo(WIDTH, GROUND);
            ctx.stroke();

            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ff0000';
            ctx.strokeStyle = 'rgba(255, 50, 50, 0.3)';
            ctx.lineWidth = 50;
            ctx.beginPath();
            ctx.moveTo(0, 50);
            ctx.quadraticCurveTo(WIDTH / 2, 100, WIDTH, 50);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            drawBackground();

            if (player1 && player2) {
                if (gameState === 'playing') {
                    if (keys['ArrowLeft'] || keys['KeyA']) player1.moveLeft();
                    else if (keys['ArrowRight'] || keys['KeyD']) player1.moveRight();
                    else player1.stopMove();
                    
                    if (keys['ArrowUp'] || keys['KeyW']) player1.jump();
                    
                    player1.isBlocking = keys['KeyS'] || false;

                    if (keys['KeyZ']) player1.lightPunch();
                    else if (keys['KeyX']) player1.heavyPunch();
                    else if (keys['KeyC']) player1.lightKick();
                    else if (keys['KeyV']) player1.heavyKick();
                    else if (keys['KeyQ']) player1.special();

                    if (player2.ai) {
                        player2.ai.update(player1);
                    }
                    
                    player1.hasHit = false;
                    player2.hasHit = false;
                    
                    checkHit(player1, player2);
                    checkHit(player2, player1);
                }

                player1.update(player2);
                player2.update(player1);

                player1.draw();
                player2.draw();

                updateUI();
            }

            requestAnimationFrame(gameLoop);
        }

        document.querySelectorAll('.character-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.character-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedChar = parseInt(card.dataset.char);
            });
        });

        document.addEventListener('keydown', e => {
            keys[e.code] = true;
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            resetGame();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            resetGame();
        });

        gameLoop();
    </script>
</body>
</html>
