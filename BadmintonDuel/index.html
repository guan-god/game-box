<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双人羽毛球对打</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #1f384f, #0e1a28);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f3f7ff;
    }
    .container {
      width: min(980px, 95vw);
      display: grid;
      gap: 14px;
    }
    canvas {
      width: 100%;
      height: auto;
      border: 2px solid #89c2ff;
      border-radius: 10px;
      background: linear-gradient(#6bc2ff, #7ce0ff 45%, #3fb36f 46%, #2e9358);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
    }
    .panel {
      background: rgba(11, 24, 38, 0.85);
      border: 1px solid rgba(137, 194, 255, 0.35);
      border-radius: 10px;
      padding: 12px;
      line-height: 1.6;
      font-size: 14px;
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
    }
    strong { color: #9fd4ff; }
    kbd {
      background: #1f3349;
      border: 1px solid #6c9ccd;
      border-bottom-width: 3px;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="container">
    <canvas id="game" width="960" height="540"></canvas>
    <section class="panel controls">
      <div>
        <strong>左侧玩家（红）</strong><br />
        移动：<kbd>A</kbd> <kbd>D</kbd><br />
        高远球：<kbd>W</kbd><br />
        扣杀：<kbd>S</kbd><br />
        放网：<kbd>Q</kbd>
      </div>
      <div>
        <strong>右侧玩家（蓝）</strong><br />
        移动：<kbd>←</kbd> <kbd>→</kbd><br />
        高远球：<kbd>↑</kbd><br />
        扣杀：<kbd>↓</kbd><br />
        放网：<kbd>/</kbd>
      </div>
      <div>
        <strong>玩法说明</strong><br />
        让羽毛球落在对方场地得分。先到 11 分获胜。每次发球会重置到本回合赢球方。
      </div>
    </section>
  </main>
  <script src="game.js"></script>
</body>
</html>
